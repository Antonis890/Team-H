<!--SCORE-->
<h3>test 5 - score</h3>


<p>Enter input:</p>

<table id="score-test-results-table" border="1">
    <tr>
        <th>Expected completed</th>
        <th>Computed completed</th>
        <th>Expected finished</th>
        <th>Computed finished</th>
        <th>Expected score</th>
        <th>Computed score</th>
        <th>Computed status</th>
        <th>Computed status</th>
        <th>Pass/Fail</th>
    </tr>
</table>

<script>

    let Score_API = "https://codecyprus.org/th/test-api/score";
    const scoreTable = document.getElementById('score-test-results-table');

    let testPairs = [
        { completed: false, finished: false, score: 42, status: "OK" },
    ];

    function buildScoreURL(pair) {
        return Score_API +
            "?completed=" + pair.completed +
            "&finished=" + pair.finished;
    }

    async function runScoreTests() {
        let html = "";

        for (let pair of testPairs) {
            let json = await (await fetch(buildScoreURL(pair))).json();

            let success = true;

            if (json.status !== pair.status) success = false;
            if (json.completed !== pair.completed) success = false;
            if (json.finished !== pair.finished) success = false;
            if (json.score !== pair.score) success = false;

            html += "<tr>" +
                "<td>" + pair.completed + "</td>" +
                "<td>" + json.completed + "</td>" +
                "<td>" + pair.finished + "</td>" +
                "<td>" + json.finished + "</td>" +
                "<td>" + pair.score + "</td>" +
                "<td>" + json.score + "</td>" +
                "<td>" + pair.status + "</td>" +
                "<td>" + json.status + "</td>" +
                "<td>" + (success ? "✅" : "❌") + "</td>" +
                "</tr>";
        }

        scoreTable.innerHTML += html;
    }

    runScoreTests();
</script>
</body>
