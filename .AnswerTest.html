<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="app.html">Play the app</a>
    <a href="notes.html">Notes</a>
</nav>

<h1>Answer Test</h1>

<table id="ResultTable" border="1">

    <tr>
        <th>Expected correct</th>
        <th>Computed correct</th>
        <th>Expected completed</th>
        <th>Computed completed</th>
        <th>Expected message</th>
        <th>Computed message</th>
        <th>Expected score</th>
        <th>Computed score</th>
        <th>Expected status</th>
        <th>Computed status</th>
        <th>Pass/Fail</th>
    </tr>
</table>

<script>
    let TEST_API_LINK = "https://codecyprus.org/th/test-api/answer";

    const ResultTable = document.getElementById('ResultTable');

    const AnswerTestPairs = [
        { correct: true,  completed: false, message: "Correct answer, well done!", score: 10,  status: "OK" },
        { correct: true,  completed: true,  message: "Correct answer, well done!", score: 10,  status: "OK" },
        { correct: false, completed: false, message: "Wrong answer, try again.", score: -3, status: "OK" },
    ];

    function AnswerCall(pair) {
        const params = [];

        if (pair.correct) params.push("correct"); // present when true

        params.push("completed=" + encodeURIComponent(pair.completed));

        return TEST_API_LINK + "?" + params.join("&");
    }

    async function runTests() {
        let rowsHtml = "";

        for (const pair of AnswerTestPairs) {
            const call = AnswerCall(pair);
            const json = await (await fetch(call)).json();

            const correct = json.correct;
            const completed = json.completed;
            const message = json.message;
            const score = json.score;
            const status = json.status;

            let success = true;

            if (status !== pair.status) {
                success = false;
            }
            if (correct !== pair.correct) {
                success = false;
            }
            if (completed !== pair.completed) {
                success = false;
            }
            //if (score !== pair.score) {
            //    success = false;
            //}
            if (message !== pair.message) {
                success = false;
            }

            rowsHtml += "<tr>"
                + "<td>" + pair.correct + "</td>"
                + "<td>" + correct + "</td>"
                + "<td>" + pair.completed + "</td>"
                + "<td>" + completed + "</td>"
                + "<td>" + pair.message + "</td>"
                + "<td>" + message + "</td>"
                + "<td>" + pair.score + "</td>"
                + "<td>" + score + "</td>"
                + "<td>" + pair.status + "</td>"
                + "<td>" + status + "</td>"
                + "<td>" + (success ? "✅" : "❌") + "</td>"
                + "</tr>";
        }

        ResultTable.innerHTML += rowsHtml;
    }

    runTests();
</script>
</body>
</html>
