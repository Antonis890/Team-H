<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="app.html">Play the app</a>
    <a href="notes.html">Notes</a>
</nav>

<h1>Testing Treasure Hunts (List API)</h1>

<p>
    API:
    <a href="https://codecyprus.org/th/api/list" target="_blank">
        codecyprus.org/th/api/list
    </a>
</p>

<p>Enter number of treasure hunts:</p>

<form onsubmit="getTreasureHunts(); return false;">
    <input type="number" id="size" value="2" />
    <button type="submit">Submit</button>
</form>

<br>

<table id="test-results-table" border="1">
    <tr>
        <th>Expected Name</th>
        <th>Computed Name</th>
        <th>Expected Description</th>
        <th>Computed Description</th>
        <th>Expected Status</th>
        <th>Computed Status</th>
        <th>Pass/Fail</th>
    </tr>
</table>

<script>
    let API_URL = "https://codecyprus.org/th/api/list";
    const table = document.getElementById("test-results-table");

    // i made the first name and description match with the computed one
     testPairs = [
        { name: "⚔️ CO1111 Treasure Hunt 2026 ⚔️", description: "The Computing Challenge Treasure Hunt - 2026", status: "OK" },
        { name: "Treasure Hunt 2", description: "Test hunt", status: "OK" }
    ];

    function buildURL(size) {
        return API_URL + "?number-of-ths=" + encodeURIComponent(size);
    }

    async function getTreasureHunts() {
        const size = document.getElementById("size").value;


            let response = await fetch(buildURL(size));
            let data = await response.json();

            console.log(data);


            let hunts = data.treasureHunts;

        let html = "";

        for (let i = 0; i < testPairs.length; i++) {

            let expected = testPairs[i];
            let actual = hunts[i];

            if (!actual) continue;

            const name = actual.name;
            const description = actual.description;
            const status = data.status;

            let success = true;

            if (name !== expected.name) success = false;
            if (description !== expected.description) success = false;
            if (status !== expected.status) success = false;

            html += "<tr>" +
                "    <td>" + expected.name + "</td>\n" +
                "    <td>" + name + "</td>\n" +
                "    <td>" + expected.description + "</td>\n" +
                "    <td>" + description + "</td>\n" +
                "    <td>" + expected.status + "</td>\n" +
                "    <td>" + status + "</td>\n" +
                "    <td>" + (success ? "✅" : "❌") + "</td>" +
                "</tr>";
        }

        table.innerHTML += html;


    }
    //getTreasureHunts(); i tried running it without the button but it didnt work :(
</script>
</body>
</html>
