<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="app.html">Play the app</a>
    <a href="notes.html">Notes</a>
</nav>

<h1>Question Test</h1>

<table id="ResultTable" border="1">

    <tr>
        <th>Expected question type</th>
        <th>Computed question type</th>
        <th>Expected canBeSkipped</th>
        <th>Computed canBeSkipped</th>
        <th>Expected requiresLocation</th>
        <th>Computed requiresLocation</th>
        <th>Expected status</th>
        <th>Computed status</th>
        <th>Pass/Fail</th>
    </tr>
</table>

<script>

    let TEST_API_LINK = "https://codecyprus.org/th/test-api/question";

    const ResultTable = document.getElementById('ResultTable');

    // testing core question components
    const QuestionTestPairs = [
        { questionType: "MCQ", canBeSkipped: true, requiresLocation: true, status: "OK" },
        { questionType: "INTEGER", canBeSkipped: false, requiresLocation: false, status: "OK" },
        { questionType: "BOOLEAN", canBeSkipped: true, requiresLocation: false, status: "OK" },
        { questionType: "TEXT", canBeSkipped: false, requiresLocation: true, status: "OK" },
    ];

    function questionCall(pair) {

        const parameters = [];
        parameters.push("question-type=" + encodeURIComponent(pair.questionType));

        if (pair.canBeSkipped) {
            parameters.push("can-be-skipped");
        }
        if (pair.requiresLocation) {
            parameters.push("requires-location");
        }
        parameters.push("completed");
        return TEST_API_LINK + "?" + parameters.join("&");
    }

    async function runTests() {

        let rowsHtml = "";

        for (const pair of QuestionTestPairs) {

            //const call = await fetch(`https://codecyprus.org/th/test-api/question?completed&question-type=${pair.questionType}&can-be-skipped&requires-location`);
            const call = questionCall(pair);
            const json = await (await fetch(call)).json();
            const questionType = json.questionType;
            const canBeSkipped = json.canBeSkipped;
            const requiresLocation = json.requiresLocation;
            const status = json.status;

            let success = true;
            if (status !== pair.status) {
                success = false;
            }
            if (questionType !== pair.questionType) {
                success = false;
            }
            if (canBeSkipped !== pair.canBeSkipped) {
                success = false;
            }
            if (status !== pair.status) {
                success = false;
            }

            rowsHtml += "<tr>" +
                "    <td>" + pair.questionType + "</td>\n" +
                "    <td>" + questionType + "</td>\n" +
                "    <td>" + pair.canBeSkipped + "</td>\n" +
                "    <td>" + canBeSkipped +"</td>\n" +
                "    <td>" + pair.requiresLocation + "</td>\n" +
                "    <td>" + requiresLocation + "</td>\n" +
                "    <td>" + pair.status + "</td>\n" +
                "    <td>" + status + "</td>\n" +
                "    <td>" + (success ? "✅" : "❌") + "</td>" +
                "</tr>";
        }
        ResultTable.innerHTML += rowsHtml;

    }
    runTests();

</script>
</body>
</html>
