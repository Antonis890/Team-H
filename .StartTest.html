<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start API Test</title>
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="app.html">Play the app</a>
    <a href="notes.html">Notes</a>
</nav>

<h1>Start API Test</h1>

<table id="ResultTable" border="1">
    <tr>
        <th>Expected status</th>
        <th>Computed status</th>
        <th>Expected error</th>
        <th>Computed error</th>
        <th>Pass/Fail</th>
    </tr>
</table>

<script>
    const START_API_LINK = "https://codecyprus.org/th/api/start";
    const ResultTable = document.getElementById("ResultTable");

    // Put the values you want to test here
    const BASE_QUERY = {
        app: "simpsons-app",
        "treasure-hunt-id": "ag9nfmNvZGVjeXBydXNvcmdyGQsSDFRyZWFzdXJlSHVudBiAgICAvKGCCgw",
    };

    // Because "Homer" is already in use per your example response,
    // this test expects ERROR for Homer.
    // You can also include a different playerName to expect OK.
    const StartTestPairs = [
        {
            player: "Homer",
            expectedStatus: "ERROR",
            expectedErrorIncludes: "already in use",
        },
        {
            // try a different player name to get a successful start (expected OK)
            player: "Homer_" + Math.floor(Math.random() * 100000),
            expectedStatus: "OK",
            expectedErrorIncludes: "",
        }
    ];

    function StartCall(pair) {
        const params = new URLSearchParams();
        params.set("player", pair.player);
        params.set("app", BASE_QUERY.app);
        params.set("treasure-hunt-id", BASE_QUERY["treasure-hunt-id"]);
        return START_API_LINK + "?" + params.toString();
    }

    async function runTests() {
        let rowsHtml = "";

        for (const pair of StartTestPairs) {
            const call = StartCall(pair);


            const json = await(await fetch(call)).json();
            const status = json.status;
            const errorMessages = Array.isArray(json.errorMessages) ? json.errorMessages : [];
            const computedErrorText = errorMessages.length ? errorMessages.join(" | ") : "";

            const success =
                status === pair.expectedStatus &&
                (
                    !pair.expectedErrorIncludes ||
                    computedErrorText.includes(pair.expectedErrorIncludes)
                );

            rowsHtml += "<tr>"
                + "<td>" + pair.expectedStatus + "</td>"
                + "<td>" + status + "</td>"
                + "<td>" + (pair.expectedErrorIncludes || "(none)") + "</td>"
                + "<td>" + (computedErrorText || "(none)") + "</td>"
                + "<td>" + (success ? "✅" : "❌") + "</td>"
                + "</tr>";
        }
        ResultTable.innerHTML += rowsHtml;
    }

    runTests();
</script>
</body>
</html>
